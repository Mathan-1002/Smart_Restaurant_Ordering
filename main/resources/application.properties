# ──────────────────────────────────────────────────────────────────
# SmartRestaurant – Application Configuration (SQLite)
# ──────────────────────────────────────────────────────────────────

# Server
server.port=8080

# ──────────────────────────────────────────────────────────────────
# DATABASE – SQLite (persistent file, no server setup needed)
# The file "restaurant.db" is created in the project root folder.
# Open it in VS Code with the "SQLite Viewer" extension.
# ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:restaurant.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# ──────────────────────────────────────────────────────────────────
# JPA / Hibernate – SQLite dialect
# update = create tables if missing, keep existing data on restart
# ──────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SQLite does not support sequences – use TABLE-based id generation
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# App name
spring.application.name=SmartRestaurant
